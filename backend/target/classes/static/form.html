<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fill Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">Dynamic Form Builder</a>
      <div class="nav-links">
        <a href="/form-builder.html">Builder</a>
        <a href="/form.html">Form</a>
        <a href="/dashboard.html">Dashboard</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h1>Fill a Form</h1>
      <p class="small">Enter a form ID or open this page with ?id=FORM_ID</p>

      <label for="formId">Form ID</label>
      <input id="formId" type="text" placeholder="Paste form ID here" />
      <button id="loadBtn" class="secondary">Load Form</button>
    </div>

    <div id="formCard" class="card" style="display:none;">
      <h2 id="formTitle"></h2>
      <form id="dynamicForm"></form>
      <button id="submitBtn">Submit Response</button>
      <p id="message" class="small"></p>
    </div>
  </div>

  <script>
    const formIdInput = document.getElementById("formId");
    const loadBtn = document.getElementById("loadBtn");
    const formCard = document.getElementById("formCard");
    const formTitle = document.getElementById("formTitle");
    const dynamicForm = document.getElementById("dynamicForm");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");

    let currentForm = null;

    // If URL has ?id=..., prefill and auto-load
    const params = new URLSearchParams(window.location.search);
    const urlId = params.get("id");
    if (urlId) {
      formIdInput.value = urlId;
      loadForm(urlId);
    }

    loadBtn.addEventListener("click", () => {
      const id = formIdInput.value.trim();
      if (id) loadForm(id);
    });

    async function loadForm(id) {
      message.textContent = "";
      dynamicForm.innerHTML = "";

      try {
        const res = await fetch(`/form/${id}`);
        if (!res.ok) {
          message.textContent = "Form not found.";
          return;
        }

        const form = await res.json();
        currentForm = form;
        formTitle.textContent = form.title;

        form.fields.forEach((field, index) => {
          const block = document.createElement("div");
          block.className = "card";
          block.dataset.type = field.type;
          block.dataset.index = index;

          const label = document.createElement("label");
          label.textContent = field.label + (field.required ? " *" : "");
          block.appendChild(label);

          renderField(block, field, index);
          dynamicForm.appendChild(block);
        });

        formCard.style.display = "block";
      } catch (err) {
        message.textContent = "Error connecting to backend.";
      }
    }

    function renderField(block, field, index) {
      const type = field.type;
      const name = `field-${index}`;

      if (type === "short_answer") {
        const input = document.createElement("input");
        input.type = "text";
        input.name = name;
        block.appendChild(input);
      } else if (type === "paragraph") {
        const textarea = document.createElement("textarea");
        textarea.name = name;
        block.appendChild(textarea);
      } else if (type === "multiple_choice") {
        (field.options || []).forEach(opt => {
          const wrapper = document.createElement("div");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = name;
          input.value = opt;
          const span = document.createElement("span");
          span.textContent = " " + opt;
          wrapper.appendChild(input);
          wrapper.appendChild(span);
          block.appendChild(wrapper);
        });
      } else if (type === "checkboxes") {
        (field.options || []).forEach(opt => {
          const wrapper = document.createElement("div");
          const input = document.createElement("input");
          input.type = "checkbox";
          input.name = name;
          input.value = opt;
          const span = document.createElement("span");
          span.textContent = " " + opt;
          wrapper.appendChild(input);
          wrapper.appendChild(span);
          block.appendChild(wrapper);
        });
      } else if (type === "dropdown") {
        const select = document.createElement("select");
        select.name = name;
        (field.options || []).forEach(opt => {
          const option = document.createElement("option");
          option.value = opt;
          option.textContent = opt;
          select.appendChild(option);
        });
        block.appendChild(select);
      } else if (type === "linear_scale") {
        const select = document.createElement("select");
        select.name = name;
        const min = field.min || 1;
        const max = field.max || 5;
        for (let v = min; v <= max; v++) {
          const option = document.createElement("option");
          option.value = String(v);
          option.textContent = String(v);
          select.appendChild(option);
        }
        block.appendChild(select);

        const help = document.createElement("div");
        help.className = "small";
        help.textContent = `${field.leftLabel || ""} ${field.leftLabel || field.rightLabel ? "-" : ""} ${field.rightLabel || ""}`.trim();
        if (help.textContent) block.appendChild(help);
      } else if (type === "multiple_choice_grid") {
        const table = buildGrid(field, index, false);
        block.appendChild(table);
      } else if (type === "checkbox_grid") {
        const table = buildGrid(field, index, true);
        block.appendChild(table);
      } else if (type === "date") {
        const input = document.createElement("input");
        input.type = "date";
        input.name = name;
        block.appendChild(input);
      } else if (type === "time") {
        const input = document.createElement("input");
        input.type = "time";
        input.name = name;
        block.appendChild(input);
      } else if (type === "file_upload") {
        const input = document.createElement("input");
        input.type = "file";
        input.name = name;
        input.multiple = true;
        block.appendChild(input);
        const note = document.createElement("div");
        note.className = "small";
        note.textContent = "Note: only file names are saved in this demo.";
        block.appendChild(note);
      }
    }

    function buildGrid(field, index, isCheckbox) {
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      headRow.appendChild(document.createElement("th"));

      (field.columns || []).forEach(col => {
        const th = document.createElement("th");
        th.textContent = col;
        headRow.appendChild(th);
      });

      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      (field.rows || []).forEach((rowLabel, rIndex) => {
        const tr = document.createElement("tr");
        const rowHead = document.createElement("td");
        rowHead.textContent = rowLabel;
        tr.appendChild(rowHead);

        (field.columns || []).forEach(col => {
          const td = document.createElement("td");
          const input = document.createElement("input");
          input.type = isCheckbox ? "checkbox" : "radio";
          input.name = isCheckbox ? `field-${index}-row-${rIndex}` : `field-${index}-row-${rIndex}`;
          input.value = col;
          td.appendChild(input);
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      return table;
    }

    submitBtn.addEventListener("click", async () => {
      const id = formIdInput.value.trim();
      if (!id || !currentForm) return;

      const responses = {};
      const errors = [];

      currentForm.fields.forEach((field, index) => {
        const type = field.type;
        const name = `field-${index}`;

        if (type === "short_answer" || type === "paragraph" || type === "date" || type === "time") {
          const input = dynamicForm.querySelector(`[name='${name}']`);
          const value = input ? input.value : "";
          if (field.required && !value) errors.push(field.label);
          responses[field.label] = value;
        } else if (type === "dropdown" || type === "linear_scale") {
          const select = dynamicForm.querySelector(`[name='${name}']`);
          const val = select ? select.value : "";
          if (field.required && !val) errors.push(field.label);
          responses[field.label] = type === "linear_scale" && val !== "" ? Number(val) : val;
        } else if (type === "multiple_choice") {
          const checked = dynamicForm.querySelector(`input[name='${name}']:checked`);
          const value = checked ? checked.value : "";
          if (field.required && !value) errors.push(field.label);
          responses[field.label] = value;
        } else if (type === "checkboxes") {
          const checked = Array.from(dynamicForm.querySelectorAll(`input[name='${name}']:checked`)).map(i => i.value);
          if (field.required && checked.length === 0) errors.push(field.label);
          responses[field.label] = checked;
        } else if (type === "multiple_choice_grid") {
          const rowMap = {};
          let allRowsAnswered = true;
          (field.rows || []).forEach((rowLabel, rIndex) => {
            const rowName = `field-${index}-row-${rIndex}`;
            const checked = dynamicForm.querySelector(`input[name='${rowName}']:checked`);
            const value = checked ? checked.value : "";
            if (!value) allRowsAnswered = false;
            rowMap[rowLabel] = value;
          });
          if (field.required && !allRowsAnswered) errors.push(field.label);
          responses[field.label] = rowMap;
        } else if (type === "checkbox_grid") {
          const rowMap = {};
          let allRowsAnswered = true;
          (field.rows || []).forEach((rowLabel, rIndex) => {
            const rowName = `field-${index}-row-${rIndex}`;
            const checked = Array.from(dynamicForm.querySelectorAll(`input[name='${rowName}']:checked`)).map(i => i.value);
            if (checked.length === 0) allRowsAnswered = false;
            rowMap[rowLabel] = checked;
          });
          if (field.required && !allRowsAnswered) errors.push(field.label);
          responses[field.label] = rowMap;
        } else if (type === "file_upload") {
          const input = dynamicForm.querySelector(`input[name='${name}']`);
          const files = input && input.files ? Array.from(input.files).map(f => f.name) : [];
          if (field.required && files.length === 0) errors.push(field.label);
          responses[field.label] = files;
        }
      });

      if (errors.length > 0) {
        message.textContent = "Please fill required fields: " + errors.join(", ");
        return;
      }

      try {
        const res = await fetch(`/submit/${id}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ responses })
        });

        if (!res.ok) {
          message.textContent = "Failed to submit response.";
          return;
        }

        message.textContent = "Response submitted!";
      } catch (err) {
        message.textContent = "Error connecting to backend.";
      }
    });
  </script>
</body>
</html>
